<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulator</title>
    <base href="/jeu-simulation/">
    <link rel="stylesheet" href="./main.css">
    <script type="module" defer>
        import {dotnet} from './_framework/dotnet.js';
        const {getAssemblyExports, Config} = await dotnet
            .withDiagnosticTracing(false)
            .create();
        import './main.js';
    </script>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    <div id="controls">
        <button type="button" id="search-wood-btn">Chercher du bois</button>
        <button type="button" id="farms-btn">Construire une ferme</button>
        <button type="button" id="cityhall-btn">Construire la mairie</button>
    </div>
</body>
</html>
